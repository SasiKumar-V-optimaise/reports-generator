diagnosis:
  t_origin_gap_min: "00:01:30"
  t_origin_gap_max: "00:03:20"

verification:
  mode: loadcell
  gate_open_max_interval_seconds: 120

missing_loadcell_video:
  enabled: true
  pre_origin_seconds: 60
  clip_duration_seconds: 300

gate_coverage:
  interval_minutes: 10
  recent_window_minutes: 10
  min_average_percent: 80
  roi_name: roi_gate2_closed
  gate2_class_id: 3
  alert_on_no_samples: false

email:
  enabled: true
  smtp_server: smtp.gmail.com
  smtp_port: 587
