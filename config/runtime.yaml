  executable: rclone
  remote: gdrive
  base_path: Electrosteel/Daily pipe recordings
  raw_csv_directory: Pipes_Data_Sheet
  video_directory: Pipe_count_videos

video_retention:
  keep_days: 5
  include_overlay_videos: true

storage:
  device: /dev/nvme0n1p1
  alert_threshold_percent: 90

logging:
  level: INFO
