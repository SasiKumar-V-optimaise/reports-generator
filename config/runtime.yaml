video:
  fps: 10
  codec: mp4v
  # auto reads the source app publish_overlay flag; true means history images already have overlays.
  input_images_have_overlay: auto
  resolution:
    width: auto
    height: auto
  output_dir: outputs/videos
  overlay_output_dir: outputs/videos-overlay

gdrive:
  remote: gdrive
  base_path: "Electrosteel/Daily pipe recordings"
  pipes_csv_dir: "Pipes_Data_Sheet"
  videos_dir: "Pipe_count_caster2_vid"
logging:
  level: INFO   # DEBUG / INFO / WARNING / ERROR

casters:
  defaults:
    enabled: false
    var_root: ../electrosteel_pipe_detection_prod/var
    database_file: caster_{number}_pipes.db
    history_dir: history
    outputs:
      csv_dir_template: outputs/{caster_id}/csv
      video_dir_template: outputs/{caster_id}/videos
      overlay_video_dir_template: outputs/{caster_id}/videos-overlay
    gdrive:
      pipes_csv_dir_template: Pipes_Data_Sheet/{caster_id}
      videos_dir_template: Pipe_count_{caster_id}_vid

  items:
